<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country Information Fetch</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <main
      class="main-container flex flex-col items-center h-screen w-full bg-gray-200 p-10"
    >
      <div class="input-container flex items-center justify-center gap-20 mb-6">
        <input
          type="text"
          id="countryInput"
          placeholder="Enter country name"
          class="input-field placeholder-gray-600 placeholder:text-center border border-gray-400 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />

        <button
          id="fetchButton"
          class="fetch-button bg-blue-700 text-white px-4 py-2 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-800"
        >
          Fetch Country Info
        </button>
      </div>
      <div>
        <div id="countryInfo" class="country-info"></div>
      </div>
    </main>
  </body>
  <script src="script.js"></script>
</html>
